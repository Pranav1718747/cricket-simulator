version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: cricketsim
      POSTGRES_USER: cricketsim_user
      POSTGRES_PASSWORD: cricketsim_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
